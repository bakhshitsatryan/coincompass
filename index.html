<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070f" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="mask-icon" href="%BASE_URL%favicon.svg" color="#ffce45" />
    <meta
      name="description"
      content="CoinCompass — turn your CoinStats crypto portfolio into an interactive world map. See how you'd live in every country, from King to Homeless."
    />
    <title>CoinCompass — Your Crypto, Mapped to the World</title>

    <!-- Fonts: load without blocking first paint. We preconnect, then swap the
         stylesheet in via media="print" -> "all" once it has downloaded so the
         page never sits on a black screen waiting for the font CSS. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap"
      />
    </noscript>

    <!-- Paint the brand background immediately, before the JS bundle parses, so
         mobile never shows a bare black screen during load. -->
    <style>
      html,
      body {
        margin: 0;
        background: radial-gradient(120% 120% at 50% -10%, #0a0e18 0%, #050608 55%);
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      .app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .app-boot__spinner {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2px solid rgba(255, 206, 69, 0.22);
        border-top-color: #ffce45;
        animation: app-boot-spin 0.7s linear infinite;
      }
      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot__spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Inline boot fallback shown during initial download/parse; React
           replaces it on mount. -->
      <div class="app-boot"><div class="app-boot__spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
