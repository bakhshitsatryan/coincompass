<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CoinCompass">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#16110a" />
      <stop offset="55%" stop-color="#0a0c12" />
      <stop offset="100%" stop-color="#050608" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe48f" />
      <stop offset="55%" stop-color="#ffce45" />
      <stop offset="100%" stop-color="#f2a83a" />
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="16" fill="url(#bg)" />
  <rect x="3.75" y="3.75" width="56.5" height="56.5" rx="15.25" fill="none" stroke="rgba(255,206,69,0.42)" stroke-width="1.5" />
  <circle cx="32" cy="32" r="19" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" />
  <!-- E-W needle, dim -->
  <path d="M12 32 L32 29 L52 32 L32 35 Z" fill="rgba(255,206,69,0.30)" />
  <!-- N-S needle: north bright, south muted -->
  <path d="M32 11 L37.5 32 L26.5 32 Z" fill="url(#gold)" />
  <path d="M32 53 L37.5 32 L26.5 32 Z" fill="rgba(255,206,69,0.42)" />
  <!-- hub -->
  <circle cx="32" cy="32" r="3.4" fill="#0a0c12" stroke="url(#gold)" stroke-width="1.6" />
</svg>
